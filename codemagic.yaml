# Cavalyra – Codemagic CI/CD for iOS App Store releases
# Docs: https://docs.codemagic.io/yaml-code-signing/signing-ios/
#        https://docs.codemagic.io/yaml-quick-start/building-a-native-ios-app/
#
# Signing model (unchanged, already working):
#   - Apple Distribution certificate + private key stored in Codemagic
#   - App Store Connect API integration named "Codemagic"
#   - environment.ios_signing pulls identity + fetches/creates profile,
#     imports into keychain, and patches the Xcode project automatically.
#
# Build target:
#   This Capacitor project has NO CocoaPods and therefore NO .xcworkspace –
#   only ios/App/App.xcodeproj exists (with SPM via CapApp-SPM). We therefore
#   build the .xcodeproj directly via `xcode-project build-ipa --project`,
#   which is the officially supported path per Codemagic docs.

workflows:
  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic   # must match Team → Integrations exactly
    environment:
      groups:
        - cavalyra                 # DEVELOPMENT_TEAM
      node: 22                     # Capacitor 8 requires Node >= 20.19 / >= 22
      xcode: latest
      vars:
        BUNDLE_ID: "de.cavalyra.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6753960225"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web + Capacitor sync
        script: |
          npm run build
          npx cap sync ios
      - name: Bump build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Assign provisioning profile to target
        # ios_signing fetches the profile & imports the cert into the keychain,
        # but for a manually-signed Capacitor/SPM .xcodeproj we still need to
        # patch the target so xcodebuild knows which profile + team + identity
        # to use. `xcode-project use-profiles` does exactly that using the
        # profiles already downloaded to ~/Library/MobileDevice/Provisioning Profiles.
        script: |
          xcode-project use-profiles \
            --project "$XCODE_PROJECT"
      - name: Build IPA
        # No CocoaPods → no .xcworkspace. Build the .xcodeproj directly.
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --export-options-plist "ios/ExportOptions.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
