# Cavalyra – Codemagic CI/CD for iOS App Store releases
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-ios-app/
#
# One-time Codemagic setup:
#   1. Connect the Git repo.
#   2. Teams → Integrations → App Store Connect: add API key (Issuer ID +
#      Key ID + .p8). The integration name below must match exactly.
#   3. Environment variables group `cavalyra`:
#        DEVELOPMENT_TEAM = 228M5VDU87
#      (PROVISIONING_PROFILE_SPECIFIER is NOT needed — the profile fetched
#       at build time is applied automatically by `xcode-project use-profiles`.)
#
# Signing model: fully automatic. Codemagic uses the App Store Connect API
# to create a new Apple Distribution certificate (private key kept on
# Codemagic's side) and a matching App Store provisioning profile for the
# bundle id on the first build, and reuses them on subsequent builds. No
# .p12 upload, no manual profile management.

workflows:
  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - cavalyra
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "de.cavalyra.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6753960225"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web + Capacitor sync
        script: |
          npm run build
          npx cap sync ios
      - name: Initialize keychain
        script: keychain initialize
      - name: Create / fetch Apple Distribution certificate + App Store profile
        # `--create` provisions a new Distribution certificate (Codemagic
        # stores the private key so subsequent builds reuse it) and a
        # matching App Store profile for $BUNDLE_ID. No .p12 required.
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply fetched provisioning profile to Xcode project
        # Patches ios/App/App.xcodeproj so CODE_SIGN_STYLE=Manual,
        # DEVELOPMENT_TEAM, and PROVISIONING_PROFILE_SPECIFIER match the
        # profile fetched above. This overrides any stale value in
        # ios/release.xcconfig.
        script: xcode-project use-profiles
      - name: Bump build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
