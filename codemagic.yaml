# Cavalyra – Codemagic CI/CD
# Builds:
#   • android-apk  -> signierte Release-APK (Sideload / eigene Verteilung)
#   • ios-appstore -> TestFlight / App Store Release

workflows:
  android-apk:
    name: Android APK Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - cavalyra
      node: 22
      vars:
        PACKAGE_NAME: "de.cavalyra.app"
        # Optional: setzen, falls der Release-Build automatisch hochgezählt werden soll.
        # CM_BUILD_NUMBER wird von Codemagic bereitgestellt.
        ANDROID_VERSION_CODE: "11"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web + Capacitor sync
        script: |
          npm run build
          npx cap sync android
      - name: Build signed Release APK
        # Voraussetzung: In Codemagic UI ein Release-Keystore hochladen ODER
        # folgende Env-Variablen in der Gruppe "cavalyra" setzen:
        #   CM_KEYSTORE         (base64 der .jks/.keystore Datei)
        #   CM_KEYSTORE_PASSWORD
        #   CM_KEY_ALIAS
        #   CM_KEY_PASSWORD
        # Codemagic schreibt das entschlüsselte Keystore nach CM_KEYSTORE_PATH.
        script: |
          cd android
          ./gradlew assembleRelease
      - name: Rename APK
        script: |
          mkdir -p $CM_BUILD_DIR/apk
          for f in android/app/build/outputs/apk/release/*.apk; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            cp "$f" "$CM_BUILD_DIR/apk/cavalyra-${base%.apk}-v${ANDROID_VERSION_CODE:-$(date +%s)}.apk"
          done
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - $CM_BUILD_DIR/apk/*.apk

  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - cavalyra
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "de.cavalyra.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6753960225"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web + Capacitor sync
        script: |
          npm run build
          npx cap sync ios
      - name: Bump build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Assign provisioning profile to target and generate ExportOptions
        # `xcode-project use-profiles` patches the Xcode project with the
        # correct DEVELOPMENT_TEAM / PROVISIONING_PROFILE_SPECIFIER / CODE_SIGN_IDENTITY
        # from the profiles that ios_signing downloaded, AND writes a fully
        # resolved export options plist to /tmp/export_options.plist that we
        # use for the IPA export (avoids the $(PROVISIONING_PROFILE_SPECIFIER)
        # placeholder never being substituted).
        script: |
          xcode-project use-profiles \
            --project "$XCODE_PROJECT" \
            --export-options-plist /tmp/export_options.plist
          echo "--- Generated /tmp/export_options.plist ---"
          cat /tmp/export_options.plist
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --export-options-plist /tmp/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
