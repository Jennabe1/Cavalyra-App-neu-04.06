# Cavalyra – Codemagic CI/CD

workflows:
  android-apk:
    name: Android APK Release
    max_build_duration: 60

    environment:
  groups:
    - cavalyra
  node: 22
  java: 21
  vars:
    PACKAGE_NAME: "de.cavalyra.app"
    ANDROID_VERSION_CODE: "11"

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web + Capacitor sync
        script: |
          npm run build
          npx cap sync android

      - name: Build signed Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        script: |
          mkdir -p $CM_BUILD_DIR/apk
          for f in android/app/build/outputs/apk/release/*.apk; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            cp "$f" "$CM_BUILD_DIR/apk/cavalyra-${base%.apk}-v${ANDROID_VERSION_CODE:-$(date +%s)}.apk"
          done

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - $CM_BUILD_DIR/apk/*.apk

  ios-appstore:
    name: iOS App Store Release
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - cavalyra
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "de.cavalyra.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6753960225"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web + Capacitor sync
        script: |
          npm run build
          npx cap sync ios

      - name: Bump build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER + 1))

      - name: Assign provisioning profile to target and generate ExportOptions
        script: |
          xcode-project use-profiles \
            --project "$XCODE_PROJECT" \
            --export-options-plist /tmp/export_options.plist

          echo "--- Generated /tmp/export_options.plist ---"
          cat /tmp/export_options.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release \
            --export-options-plist /tmp/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
