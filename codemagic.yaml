workflows:
  android-apk:
    name: Android APK Release

    instance_type: linux
    max_build_duration: 60

    environment:
      node: 22
      groups:
        - cavalyra

      vars:
        PACKAGE_NAME: "de.cavalyra.app"
        ANDROID_VERSION_CODE: "11"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Capacitor Sync
        script: |
          npx cap sync android

      - name: Build Release APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk

  ios-appstore:
    name: iOS App Store Release

    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      node: 22
      xcode: latest

      groups:
        - cavalyra

      vars:
        BUNDLE_ID: de.cavalyra.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.cavalyra.app

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
